<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Todo List</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body><div class="header">
  <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
  </svg>
  <h1>My Todo List</h1>
</div>
    <div class="input-section">
      <input type="text" id="taskInput" placeholder="What needs to be done?">
      <button id="addTaskBtn">+</button>
    </div>
    <div class="filters">
      <button id="allBtn" class="filter-btn active">All</button>
      <button id="activeBtn" class="filter-btn">Active</button>
      <button id="completedBtn" class="filter-btn">Completed</button>
    </div>
    <ul id="taskList">
      <li class="empty">Your to-do list is empty!</li>
    </ul>
    <div class="footer">
      <span id="taskCount">0 items left</span>
      <button id="clearCompletedBtn">Clear completed</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
